apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-k3s-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: apps
  source:
    repoURL: https://github.com/SBordier44/eks-devsecops-lab-gitops
    targetRevision: main
    path: apps/demo-app/overlays/k3s-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
