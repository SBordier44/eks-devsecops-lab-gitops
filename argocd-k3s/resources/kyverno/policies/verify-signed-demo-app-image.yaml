apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-signed-demo-app-image
  annotations:
    policies.kyverno.io/title: Verify signed demo-app image
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Audit-only policy for the demo-app image. Verifies that the image pushed to
      GHCR has a valid Cosign keyless signature produced by the expected GitHub
      Actions workflow.
spec:
  webhookConfiguration:
    failurePolicy: Ignore
    timeoutSeconds: 15
  background: false
  rules:
    - name: verify-demo-app-keyless-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - demo-app-dev
      verifyImages:
        - imageReferences:
            - "ghcr.io/sbordier44/eks-devsecops-lab-dev-app*"
          failureAction: Audit
          required: true
          mutateDigest: false
          verifyDigest: false
          imageRegistryCredentials:
            helpers:
              - default
              - github
            secrets:
              - ghcr-kyverno
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: https://github.com/SBordier44/eks-devsecops-lab-app/.github/workflows/build-push-ghcr.yml@refs/heads/main
                    issuer: https://token.actions.githubusercontent.com
                    rekor:
                      url: https://rekor.sigstore.dev
