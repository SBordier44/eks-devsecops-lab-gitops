apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/SBordier44/eks-devsecops-lab-gitops
        revision: main
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{path.basename}}-dev'
    spec:
      project: apps
      source:
        repoURL: https://github.com/SBordier44/eks-devsecops-lab-gitops
        targetRevision: main
        path: '{{path}}/overlays/dev'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}-dev'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
